# AWS SES SMTP Configuration
# You can also set these as environment variables if preferred

# SMTP Host (defaults to email-smtp.us-east-1.amazonaws.com if not set)
SMTP_HOST=email-smtp.us-east-1.amazonaws.com

# SMTP Port (defaults to 587 if not set)
SMTP_PORT=587

# AWS SES SMTP Credentials
# IMPORTANT: Replace these with your actual credentials or use environment variables
AWS_SES_SMTP_USER_NAME=your-ses-smtp-username
AWS_SES_SMTP_PASSWORD=your-ses-smtp-password
